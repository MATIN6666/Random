<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scratch Card - MATIN TOPUP</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff1493;
            --dark: #1a1a1a;
            --silver: #C0C0C0;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--dark); font-family: 'Battambang', sans-serif; 
            overflow: hidden; touch-action: none; color: white;
            display: flex; align-items: center; justify-content: center;
        }

        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 500px; height: 100%; padding: 20px; box-sizing: border-box;
        }

        .header-area {
            width: 100%; text-align: center; padding: 15px 0;
            background: rgba(0,0,0,0.9); border-bottom: 3px solid var(--pink);
            position: absolute; top: 0; left: 0; z-index: 100;
        }

        .main-title { color: yellow; font-size: clamp(20px, 6vw, 26px); font-weight: 900; margin: 0; }

        .scratch-card-container {
            position: relative; 
            width: 85vw; height: 85vw; 
            max-width: 320px; max-height: 320px;
            background: white; border-radius: 25px; border: 6px solid var(--pink);
            overflow: hidden; box-shadow: 0 0 40px rgba(255, 20, 147, 0.6);
            display: flex; align-items: center; justify-content: center;
            margin-top: 20px;
        }

        .reward-display { text-align: center; user-select: none; width: 100%; }
        .reward-text { font-size: clamp(18px, 5vw, 22px); font-weight: 900; color: #333; }
        .reward-value { font-size: clamp(35px, 10vw, 50px); font-weight: 900; color: var(--pink); margin: 10px 0; }

        #scratchCanvas { 
            position: absolute; top: 0; left: 0; 
            width: 100% !important; height: 100% !important;
            cursor: crosshair; touch-action: none; z-index: 10; 
        }

        .instruction { margin: 20px 0; font-size: clamp(14px, 4vw, 18px); text-align: center; color: #eee; line-height: 1.5; }
        
        #limitArea { 
            display: none; text-align: center; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 30px 20px; border-radius: 25px; 
            border: 2px dashed var(--pink); width: 90%;
        }

        .winner-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center;
            justify-content: center; z-index: 2000;
        }
        .winner-box {
            background: white; width: 85%; max-width: 350px; padding: 40px 20px;
            border-radius: 40px; text-align: center; border: 8px solid var(--pink);
        }
        .btn-confirm {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: var(--pink); color: white; font-size: 20px; font-weight: 900;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h1 class="main-title">កាតកោសសំណាង</h1>
        </div>

        <div id="gameArea" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="scratch-card-container">
                <div class="reward-display">
                    <div class="reward-text">អបអរសាទរ!</div>
                    <div id="rewardValue" class="reward-value">---</div>
                    <div style="font-size: 14px; color: #777;">អ្នកឈ្នះរង្វាន់នេះ</div>
                </div>
                <canvas id="scratchCanvas" width="320" height="320"></canvas>
            </div>
            <div id="hintText" class="instruction"></div>
        </div>

        <div id="limitArea">
            <div style="font-size: 60px; margin-bottom: 15px;">🚫</div>
            <h2 id="limitTitle" style="color: var(--pink); margin: 0; font-size: 28px;">អ្នកបានលេងរួចហើយ!</h2>
            <p id="limitDesc" style="font-size: 16px; color: #ccc; margin-top: 15px;">
                សូមត្រឡប់មកវិញនៅ <b>ថ្ងៃស្អែក</b> ដើម្បីកោសម្ដងទៀត!
            </p>
        </div>
    </div>

    <div id="winnerPopup" class="winner-popup">
        <div class="winner-box">
            <h1 style="color:#333; margin:0; font-size: 30px;">🎊 អបអរសាទរ! 🎊</h1>
            <div id="popupReward" style="font-size: 50px; font-weight: 900; color: var(--pink); margin: 25px 0;">---</div>
            <button class="btn-confirm" onclick="closeWinner()">យល់ព្រម</button>
        </div>
    </div>

    <audio id="winSnd" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

    <script>
        /* ==================================================
           កន្លែងសម្រាប់ពូបញ្ជា (ADMIN CONTROL)
           ==================================================
           - បើចង់ "បើក" ឱ្យលេង៖ សរសេរអក្សរ "ON"
           - បើចង់ "បិទ" មិនឱ្យលេង៖ សរសេរអក្សរ "OFF"
        */
        const GAME_STATUS = "ON"; 
        /* ================================================== */

        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false;
        let isFinished = false;

        const rewards = ["បញ្ចុះតម្លៃ ៥%", "បញ្ចុះតម្លៃ ៥%", "បញ្ចុះតម្លៃ ៥%", "បញ្ចុះតម្លៃ ១០%"];

        function checkStatus() {
            // ១. ឆែកមើលការបិទបើកតាមរយៈកូដ (GAME_STATUS)
            if (GAME_STATUS === "OFF") {
                showLimit("📢 ផ្អាកជាបណ្ដោះអាសន្ន", "បច្ចុប្បន្នហ្គេមត្រូវបានបិទ។ សូមត្រឡប់មកវិញនៅពេលក្រោយ!");
                return false;
            }

            // ២. ឆែកមើលថាតើភ្ញៀវធ្លាប់លេងនៅថ្ងៃនេះឬនៅ
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem('matin_scratch_date');
            
            if (lastDate === today) {
                showLimit("🚫 អ្នកបានលេងរួចហើយ!", "សូមត្រឡប់មកវិញនៅ ថ្ងៃស្អែក ដើម្បីកោសម្ដងទៀត!");
                return false;
            }
            return true;
        }

        function showLimit(title, desc) {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('limitArea').style.display = 'block';
            if(title) document.getElementById('limitTitle').innerText = title;
            if(desc) document.getElementById('limitDesc').innerHTML = desc;
        }

        function initGame() {
            if (!checkStatus()) return;

            const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
            document.getElementById('rewardValue').innerText = randomReward;
            document.getElementById('popupReward').innerText = randomReward;

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#C0C0C0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#666';
            ctx.font = 'bold 24px Battambang';
            ctx.textAlign = 'center';
            ctx.fillText('កោសទីនេះ', 160, 170);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function scratch(e) {
            if (!isDrawing || isFinished) return;
            e.preventDefault();

            const pos = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            ctx.fill();

            checkProgress();
        }

        function checkProgress() {
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let clear = 0;
            for (let i = 3; i < pixels.length; i += 4) { if (pixels[i] === 0) clear++; }
            
            if ((clear / (pixels.length / 4)) > 0.5) {
                isFinished = true;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                localStorage.setItem('matin_scratch_date', new Date().toDateString());
                
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 3000 });
                document.getElementById('winSnd').play();
                setTimeout(() => { document.getElementById('winnerPopup').style.display = 'flex'; }, 400);
            }
        }

        function closeWinner() {
            document.getElementById('winnerPopup').style.display = 'none';
            showLimit("🚫 អ្នកបានលេងរួចហើយ!", "សូមត្រឡប់មកវិញនៅ ថ្ងៃស្អែក ដើម្បីកោសម្ដងទៀត!");
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch);

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
